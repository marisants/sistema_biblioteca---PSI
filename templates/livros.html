{% extends 'base.html' %}

{% block cont %}

<img src="{{ url_for('static', filename='img/inicio.png') }}" alt="logo">

<h2>Buscar livros</h2>

<form method="GET" action="{{ url_for('listar_livros') }}">
    <input type="text" name="titulo" placeholder="Buscar por título">
    <input type="text" name="genero" placeholder="Buscar por gênero">
    <button type="submit">Buscar</button>
</form>

<br>

<a href="{{ url_for('cadastro_livros') }}">Cadastrar novo livro</a>

<h3>Livros cadastrados:</h3>

<ul>
    {% for livro in livros %}
        <li>
            <form method="POST" action="{{ url_for('editar', id=loop.index0) }}">

                <input type="text" name="titulo" value="{{ livro.titulo }}">
                <input type="text" name="autor" value="{{ livro.autor }}">
                <input type="number" name="ano" value="{{ livro.ano }}">
                <input type="text" name="genero" value="{{ livro.genero }}">

                <button type="submit">Salvar</button>
            </form>

            <a href="{{ url_for('excluir', id=loop.index0) }}">
                Remover
            </a>
        </li>
    {% endfor %}
</ul>

{% endblock %}

{% block estilo %}
<style>
.container{
  display: flex;
}

form{
  margin-top: 20px;
  margin-left: 20px;
}
</style>
{% endblock %}
