{% extends 'base.html' %}

{% block cont %}
<div class="corpo">
    <img src="{{url_for('static', filename='img/perfil.png')}}" alt="" height="150px" width="150px">
    <h1>Meu perfil</h1>
    <p>Usuário: {{ usuario }}</p>
    <p>Senha: {{ senha }}</p>
    <a href="{{ url_for('logout') }}"><button>Sair da conta</button></a>
</div>
{% endblock %}

{% block estilo %}
<style>
    .corpo{
        flex-direction: column;
        align-items: center;
        width: 50%;
    }
    .corpo p{
        background-color: rgb(173, 207, 238);
        padding: 15px;
        border-radius: 15px;
        width: 100%;
    }
    button{
        background-color: rgb(97, 155, 209);
        padding: 15px;
        border-radius: 15px;
        width: 100%;
        box-shadow: none;
        border: none;
    }
    .flash{
        width: 50%;
    }
</style>
{% endblock %}
